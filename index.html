<!DOCTYPE html>
<html lang="pt-BR">

 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de IA</title>
    <link rel="stylesheet" href="style.css">
 </head>

 <body>
    <header>
        <h1>Detector de IA</h1>
        <p>Descubra se uma imagem foi gerada por Inteligência Artificial!</p>
    </header>

    <main>
        <section id="upload-section">
            <input type="file" id="file-upload" accept="image/jpeg, image/png, image/webp">
            <button id="analyze-btn">Analisar imagem</button>
        </section>

        <section id="result-section">
            <p id="result-text">Nenhuma imagem analisada ainda.</p>
        </section>
    </main>
    <script src="script.js"></script>
 </body>
</html>
